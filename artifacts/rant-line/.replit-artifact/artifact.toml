kind = "web"
previewPath = "/"
title = "America's Rant Line"
version = "1.0.0"
id = "artifacts/rant-line"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20348

[services.development]
run = "pnpm --filter @workspace/rant-line run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rant-line", "run", "build" ]
publicDir = "artifacts/rant-line/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20348"
BASE_PATH = "/"
